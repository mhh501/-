<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智控慧学 · 学生端</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; font-weight: 500; }
        .status-badge {
            font-size: 13px;
            padding: 4px 10px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #4a90e2;
            color: white;
        }
        .message.assistant {
            align-self: flex-start;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            white-space: pre-wrap;
        }
        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            margin: 12px 0 8px;
            font-weight: 600;
        }
        .message.assistant ul, .message.assistant ol {
            padding-left: 24px;
            margin: 8px 0;
        }
        .message.assistant p { margin-bottom: 8px; }
        .message.assistant pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message.assistant code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
        .input-area {
            display: flex;
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
        }
        .input-area button {
            padding: 0 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-banner {
            background: #fee;
            color: #c33;
            padding: 12px 20px;
            text-align: center;
            border-bottom: 1px solid #fcc;
        }
        .teacher-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            margin-left: 12px;
        }
    </style>
</head>
<body>
<div class="header">
    <div style="display: flex; align-items: center;">
        <h1>📖 智控慧学 · 学生端</h1>
        <button class="teacher-btn" id="openTeacherBtn">🎓 教师控制台</button>
    </div>
    <div class="status-badge" id="connectionStatus">🟢 在线</div>
</div>
<div id="errorBanner" class="error-banner" style="display: none;"></div>
<div class="chat-container" id="chatContainer">
    <div class="message assistant">你好！我是你的学习助手。请随时向我提问。</div>
</div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="输入你的问题..." />
    <button id="sendBtn">发送</button>
</div>

<script>
    (function() {
        // ---------- 请替换为你的实际配置 ----------
        const COZE_BOT_ID = '7629057582241972259';      // 例如：7380000000000000000
        const COZE_API_TOKEN = 'pat_xpg0Zl5uiUeHorvr23zgnvfxfUMWA9rpVZta8otnFZHRcyb3Elmse1N8o3BR9jfw';    // 例如：pat_xxxxxxxxxxxx
        const COZE_API_URL = 'https://api.coze.cn/v3/chat';

        // 显示错误横幅
        function showError(message) {
            const banner = document.getElementById('errorBanner');
            banner.textContent = '⚠️ ' + message;
            banner.style.display = 'block';
        }

        // 检查配置
        if (!COZE_BOT_ID || COZE_BOT_ID === '你的智能体ID') {
            showError('请先在代码中配置 COZE_BOT_ID 和 COZE_API_TOKEN');
        }

        // 配置 marked
        if (typeof marked !== 'undefined') {
            marked.setOptions({ breaks: true, gfm: true });
        } else {
            showError('Markdown 渲染库加载失败，请检查网络。');
            window.marked = { parse: (text) => text };
        }

        const studentId = localStorage.getItem('studentId') || (() => {
            const id = 'student_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            localStorage.setItem('studentId', id);
            return id;
        })();
        let conversationId = null;

        // Electron API
        if (window.electronAPI) {
            document.getElementById('openTeacherBtn').style.display = 'inline-block';
            document.getElementById('openTeacherBtn').addEventListener('click', () => {
                window.electronAPI.openTeacherConsole();
            });
            window.electronAPI.onTeacherCommand((event, cmd) => {
                if (cmd === 'refresh') window.location.reload();
            });
        }

        function addMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = marked.parse(content);
            document.getElementById('chatContainer').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            if (!question) return;

            if (!COZE_BOT_ID || COZE_BOT_ID === '你的智能体ID') {
                alert('请先配置 Coze Bot ID 和 API Token');
                return;
            }

            addMessage('user', question);
            input.value = '';

            const assistantMsg = addMessage('assistant', '思考中...');
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const body = {
                    bot_id: COZE_BOT_ID,
                    user_id: studentId,
                    additional_messages: [{ role: 'user', content: question, content_type: 'text' }],
                    stream: true
                };
                if (conversationId) body.conversation_id = conversationId;

                const res = await fetch(COZE_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${COZE_API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(`HTTP ${res.status}: ${err}`);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                assistantMsg.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(l => l.trim());
                    for (const line of lines) {
                        try {
                            const json = JSON.parse(line);
                            if (json.event === 'message' && json.data?.content) {
                                fullText += json.data.content;
                                assistantMsg.innerHTML = marked.parse(fullText);
                            } else if (json.event === 'conversation.created' && json.data?.id) {
                                conversationId = json.data.id;
                            }
                        } catch (e) {}
                    }
                }
                if (!fullText) assistantMsg.innerHTML = marked.parse('（未收到回复）');
            } catch (e) {
                assistantMsg.innerHTML = marked.parse(`请求失败: ${e.message}`);
                showError(e.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('error', (e) => showError(e.message));
    })();
</script>
</body>
</html>
